[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "msgpack-pjsekai"
version = "6.5.0"
description = "Static object-based MessagePack models generated from dump.cs"
readme = "README.md"
requires-python = ">=3.8"
license = "MIT"
dependencies = []
keywords = ["msgpack", "pjsekai", "generated"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only"
]

[project.urls]
Homepage = "https://github.com/Sekai-World/msgpack-pjsekai"
Repository = "https://github.com/Sekai-World/msgpack-pjsekai"
Issues = "https://github.com/Sekai-World/msgpack-pjsekai/issues"

[tool.setuptools]
packages = ["msgpack_pjsekai"]

[tool.setuptools.package-data]
msgpack_pjsekai = ["__init__.pyi", "py.typed"]
